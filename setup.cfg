[mutmut]
# config#1958 deliverable 5(h): mutation testing on the risk-critical
# apply-path modules — the code that decides whether an optimizer's
# recommendation actually lands in the live S3 config (assembler.py),
# records what each auto-apply loop did (apply_audit.py), and can revert a
# regression (rollback.py). A surviving mutant here means the test suite
# would not notice if e.g. a rollback silently became a no-op or the
# assembler's merge-precedence direction flipped.
#
# Scoped (not repo-wide): mutmut's per-mutant cost is one full pytest run of
# the selected test files, so an unscoped run over ~2900 tests / thousands of
# mutants is not something CI (or a laptop) can complete in a normal budget.
# `source_paths` still points at the whole optimizer/ package (mutmut needs
# the package importable), but `only_mutate` restricts which lines actually
# get mutated to just the three apply-path modules below.
source_paths =
    optimizer
# apply_audit's tests read the FROZEN cross-repo schema + evaluate.py's
# source (string-level wiring assertions) via REPO_ROOT-relative paths —
# both must exist in mutmut's mutants/ sandbox alongside the also_copy
# default (tests/, setup.cfg) or the baseline run itself fails before a
# single mutant is even tried.
also_copy =
    contracts/
    evaluate.py
only_mutate =
    optimizer/rollback.py
    optimizer/apply_audit.py
    optimizer/assembler.py
# Test selection stays narrow to match: only the tests that exercise these
# three modules directly, so each mutant's pytest run stays sub-second
# instead of paying the full-suite cost per mutant.
pytest_add_cli_args_test_selection =
    tests/test_apply_audit.py
    tests/test_assembler.py
    tests/test_assembler_arc_e2e.py
    tests/test_rollback.py
