name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # config#1958 deliverable 5(h): weekly, NOT per-PR — a full mutmut pass
    # over even the scoped apply-path modules (setup.cfg's [mutmut]
    # only_mutate: rollback.py / apply_audit.py / assembler.py) runs well
    # over a thousand mutants; putting that on the PR-blocking `test` job
    # would make every PR pay a multi-minute-to-tens-of-minutes tax for a
    # signal that doesn't change week to week. Runs Sunday 09:00 UTC —
    # same day as the Saturday-evening weekly SF pipeline's Sunday-morning
    # backtester follow-up window.
    - cron: "0 9 * * 0"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest hypothesis

      # Undefined-name lint (config#1646 follow-on): `sim_all_orders` was
      # referenced in a function that never defined it — a NameError that only
      # detonated at report time on the live weekly (backtest.py, PR #404),
      # killing the backtester report/upload/email while primary artifacts
      # survived. A second latent one sat in evaluate.py's except handler
      # (`log` vs `logger`). F821 is a zero-false-positive class and runs
      # BEFORE the suite: an undefined name in a rarely-exercised branch is
      # exactly what tests miss.
      - name: Undefined-name lint (ruff F821)
        run: |
          pip install ruff
          ruff check --select F821 .

      - name: Run tests
        run: pytest tests/ -v

      # Advisory-only: pip-audit's newer releases emit a GH Actions error
      # annotation for any finding, which the runner honors as a step failure
      # independent of the shell exit code — `|| true` no longer suppresses
      # it (discovered 2026-07-13 when a newly-published langchain-core/
      # pyarrow CVE tripped every PR's security-audit step red). continue-on-
      # error is the runner-level equivalent of the `|| true` this step
      # always intended: report findings, never block the job on them.
      - name: Security audit
        continue-on-error: true
        run: |
          pip install pip-audit
          IGNORE_ARGS=()
          if [ -f .github/pip-audit-ignore.txt ]; then
            while IFS= read -r vuln_id; do
              IGNORE_ARGS+=(--ignore-vuln "$vuln_id")
            done < <(grep -vE '^\s*#|^\s*$' .github/pip-audit-ignore.txt)
          fi
          pip-audit "${IGNORE_ARGS[@]}"

  # Alert (Telegram) ONLY on genuine post-merge breakage of the default
  # branch. PR-branch reds — mid-fix commits, cross-repo lib-tag merge-order
  # races (e.g. the 2026-06-17 `@v0.59.8`-not-yet-tagged race) — stay silent,
  # since GitHub's built-in failure email can't distinguish transient from
  # real. Reusable workflow + transport live in nousergon-lib.
  notify-main-failure:
    needs: [test]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit

  # config#1958 deliverable 5(h): mutation testing on the risk-critical
  # apply-path modules (scope + rationale in setup.cfg's [mutmut] section).
  # Scheduled-only (see the `schedule` trigger above) — observational, does
  # NOT gate merges; surviving-mutant counts are a coverage-quality signal
  # to review, not a pass/fail contract. `mutmut results` output (which
  # test survives vs. which line) is the actionable artifact, uploaded so
  # Brian doesn't need to re-run locally to see WHICH mutants survived.
  mutmut:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest hypothesis mutmut

      - name: Run mutmut on apply-path modules (rollback / apply_audit / assembler)
        run: mutmut run --max-children 4 || true

      - name: Summarize results (survivors are the actionable signal)
        run: mutmut results

      - name: Upload mutmut cache for local `mutmut show <id>` triage
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-cache
          path: .mutmut-cache
          retention-days: 14
