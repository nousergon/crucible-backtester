name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # config#1958 deliverable 5(h): weekly, NOT per-PR — a full mutmut pass
    # over even the scoped apply-path modules (setup.cfg's [mutmut]
    # only_mutate: rollback.py / apply_audit.py / assembler.py) runs well
    # over a thousand mutants; putting that on the PR-blocking `test` job
    # would make every PR pay a multi-minute-to-tens-of-minutes tax for a
    # signal that doesn't change week to week. Runs Sunday 09:00 UTC —
    # same day as the Saturday-evening weekly SF pipeline's Sunday-morning
    # backtester follow-up window.
    - cron: "0 9 * * 0"

permissions:
  contents: read

jobs:
  # config#2758: pre-merge wheels-only dependency-resolution guard for the
  # three Lambda requirements files. Each Lambda builds from the
  # compiler-less `public.ecr.aws/lambda/python:3.12` base image (no cc/gcc),
  # so any pin bump (dependabot or hand-edited) that can only be satisfied by
  # falling back to an sdist is a build-time failure there — but a clean,
  # instant `pip install` success everywhere else, including this repo's own
  # `test` job (requirements.txt, not the Lambda files, and no --only-binary
  # constraint). Deploy #525 (2026-07-16, scipy>=1.18.0 vs the numpy<2 cap in
  # requirements-health.txt) surfaced this as a confusing meson compiler
  # error at deploy time, fixed at the instance layer by #529. This job
  # catches the whole CLASS pre-merge: `--dry-run --only-binary=:all:`
  # mirrors the Lambda image's real constraint (wheels must resolve under
  # cp312) and turns a violating bump into pip's clean `ResolutionImpossible`
  # on the PR, instead of a deploy-time compiler error on main.
  lambda-deps-resolve:
    name: Lambda deps wheels-only resolve (${{ matrix.target.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - label: health
            requirements: requirements-health.txt
          - label: concordance
            requirements: lambda_concordance/requirements-concordance.txt
          - label: counterfactual
            requirements: lambda_counterfactual/requirements-counterfactual.txt

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Wheels-only resolution dry-run (matches the Lambda build image's compiler-less constraint)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --dry-run --only-binary=:all: --ignore-installed -r ${{ matrix.target.requirements }}

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest hypothesis pytest-cov

      # Undefined-name lint (config#1646 follow-on): `sim_all_orders` was
      # referenced in a function that never defined it — a NameError that only
      # detonated at report time on the live weekly (backtest.py, PR #404),
      # killing the backtester report/upload/email while primary artifacts
      # survived. A second latent one sat in evaluate.py's except handler
      # (`log` vs `logger`). F821 is a zero-false-positive class and runs
      # BEFORE the suite: an undefined name in a rarely-exercised branch is
      # exactly what tests miss.
      - name: Undefined-name lint (ruff F821)
        run: |
          pip install ruff
          ruff check --select F821 .

      # config#3219 §121 hermetic-vs-live test split lint: every test file that
      # imports a live-service module (boto3, requests, arcticdb, …) at module
      # level must carry @pytest.mark.live (or @pytest.mark.skipif /
      # @pytest.mark.parity / test_live_* naming) so it is excluded from the
      # default hermetic suite via addopts = -m "not parity and not live".
      - name: Hermetic-vs-live marker lint
        run: python3 scripts/lint_hermetic_test_marker.py

      # --cov-fail-under not passed explicitly: pytest-cov reads
      # [tool.coverage.report] fail_under from pyproject.toml automatically
      # once --cov is passed (config#2533 coverage ratchet).
      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=term-missing

      # Blocking (config#2530): flipped from continue-on-error: true to
      # blocking as part of the fleet-wide pip-audit standardization. The
      # pre-existing GHA annotation quirk (pip-audit's newer releases emit
      # GH Actions error annotations that the runner honors independent of
      # the shell exit code) was the reason continue-on-error was used
      # originally — now that behavior is INTENTIONAL: findings fail the
      # step. Pre-cleared via .github/pip-audit-ignore.txt with documented
      # rationale per entry (mirroring crucible-executor's ignore-file
      # pattern, config#2530).
      - name: Security audit
        run: |
          pip install pip-audit
          IGNORE_ARGS=()
          if [ -f .github/pip-audit-ignore.txt ]; then
            while IFS= read -r vuln_id; do
              IGNORE_ARGS+=(--ignore-vuln "$vuln_id")
            done < <(grep -vE '^\s*#|^\s*$' .github/pip-audit-ignore.txt)
          fi
          pip-audit "${IGNORE_ARGS[@]}"

  # Alert (Telegram) ONLY on genuine post-merge breakage of the default
  # branch. PR-branch reds — mid-fix commits, cross-repo lib-tag merge-order
  # races (e.g. the 2026-06-17 `@v0.59.8`-not-yet-tagged race) — stay silent,
  # since GitHub's built-in failure email can't distinguish transient from
  # real. Reusable workflow + transport live in nousergon-lib.
  notify-main-failure:
    needs: [test, lambda-deps-resolve]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit

  # config#1958 deliverable 5(h): mutation testing on the risk-critical
  # apply-path modules (scope + rationale in setup.cfg's [mutmut] section).
  # Scheduled-only (see the `schedule` trigger above) — observational, does
  # NOT gate merges; surviving-mutant counts are a coverage-quality signal
  # to review, not a pass/fail contract. `mutmut results` output (which
  # test survives vs. which line) is the actionable artifact, uploaded so
  # Brian doesn't need to re-run locally to see WHICH mutants survived.
  mutmut:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest hypothesis mutmut

      - name: Run mutmut on apply-path modules (rollback / apply_audit / assembler)
        run: mutmut run --max-children 4 || true

      - name: Summarize results (survivors are the actionable signal)
        run: mutmut results

      - name: Upload mutmut cache for local `mutmut show <id>` triage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: mutmut-cache
          path: .mutmut-cache
          retention-days: 14
