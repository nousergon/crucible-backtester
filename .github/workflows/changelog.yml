name: System-wide deploy changelog

# Emits one JSON entry to s3://alpha-engine-research/changelog/ on every
# push-to-main. See alpha-engine-docs/.github/actions/append-changelog/README.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: changelog-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  append:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 1

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c  # v6
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: Append to system-wide deploy changelog
        uses: nousergon/nousergon-docs/.github/actions/append-changelog@765aa682f6c5b7e1e5fc241c7bac1e9e0d6ca326  # @main (resolved 2026-07-24)
        with:
          deploy_status: merged
          deploy_workflow: changelog.yml
