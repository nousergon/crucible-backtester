name: Deploy

on:
  # NO path filter — every main commit rebuilds + redeploys ALL three backtester
  # image Lambdas. Deliberate: the same silent-drift that caused the recurring
  # false `calibration_breakdown` alert on the health-check image (2026-04-08→
  # 06-25) applies identically to the two replay siblings — a fix lands in a
  # shared module (analysis/**, pipeline_common.py, the lib pin) but the
  # manually-deployed replay image was never rebuilt. Rebuilding all three
  # unconditionally (~3-5 min each, parallel) is the right trade vs silent drift.
  # Mirrors alpha-engine-predictor deploy.yml's documented no-filter rationale.
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger (e.g. ship an already-merged change)

permissions:
  id-token: write   # required for OIDC role assumption
  contents: read

jobs:
  deploy:
    name: Build + deploy ${{ matrix.target.label }} Lambda
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false   # one leg failing (e.g. a replay leg mid-IAM-grant) must
                         # NOT cancel the others — health-check must still deploy.
      matrix:
        target:
          - label: health-check
            script: infrastructure/deploy_health.sh
            function: alpha-engine-predictor-health-check
          - label: replay-counterfactual
            script: infrastructure/deploy_counterfactual.sh
            function: alpha-engine-replay-counterfactual
          - label: replay-concordance
            script: infrastructure/deploy_concordance.sh
            function: alpha-engine-replay-concordance
    # One deploy at a time PER TARGET; never cancel an in-progress deploy
    # mid-push. Job-level (not workflow-level) so it can read the matrix
    # context — the three legs run in parallel, each serializes against itself.
    concurrency:
      group: deploy-main-${{ matrix.target.label }}
      cancel-in-progress: false

    steps:
      - name: Checkout backtester repo
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d  # v6
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Each deploy_*.sh's canary-rollback path publishes a dedup-keyed alert
      # via `python3 -m krepis.alerts publish` (config#1339/config#1545) so a
      # rolled-back deploy isn't silent beyond the GHA red-icon. Without krepis
      # installed on THIS runner (not the Lambda's Docker image — this call
      # runs on the bare GHA host), the alert call fails with
      # ModuleNotFoundError and is swallowed by the trailing `|| true` —
      # silently, with no CI red. Previously only deploy_health.sh had this
      # wired in; deploy_counterfactual.sh/deploy_concordance.sh assumed
      # operator-only invocation, which no longer holds once they run in this
      # same matrixed GHA job. Pin matches requirements.txt's `krepis>=0.4.0`
      # floor.
      - name: Set up Python for canary-rollback alert publish
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install krepis for deploy_*.sh alerts call
        run: pip install "krepis>=0.4.0"

      # Each deploy_*.sh builds its lambda_*/Dockerfile (which COPYs the fixed
      # sources + pins the lib primitives), pushes to ECR, publishes a
      # version, runs a dry-run canary against the new version, and only
      # promotes the :live alias on canary success — so a bad build leaves
      # live on the prior good version (no manual rollback).
      - name: Build image + deploy ${{ matrix.target.label }} Lambda
        run: bash ${{ matrix.target.script }}

      - name: Report deployed version
        run: |
          echo "Deployed commit: ${{ github.sha }}"
          aws lambda get-function \
            --function-name ${{ matrix.target.function }} \
            --query "Configuration.[LastModified,CodeSha256]" \
            --output text

      - name: Append to system-wide deploy changelog
        if: always()
        uses: nousergon/nousergon-docs/.github/actions/append-changelog@main
        with:
          deploy_status: ${{ job.status == 'success' && 'success' || 'failure' }}
          deploy_workflow: deploy.yml
          subsystem: backtester-${{ matrix.target.label }}

  # Alert (Telegram) on genuine post-merge failure of this workflow on the
  # default branch. Reusable workflow + transport in nousergon-lib. config#1128.
  notify-main-failure:
    needs: [deploy]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
