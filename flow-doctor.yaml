flow_name: backtester
repo: nousergon/crucible-backtester
owner: "@brianmcmahon"
notify:
  - type: email
    sender: ${EMAIL_SENDER}
    recipients: ${EMAIL_RECIPIENTS}
    smtp_host: smtp.gmail.com
    smtp_port: 587
    smtp_password: ${GMAIL_APP_PASSWORD}
  - type: github
    repo: nousergon/alpha-engine-config
    token: ${FLOW_DOCTOR_GITHUB_TOKEN}
    labels: [flow-doctor, area:backtester]
    notify_on_category: [CODE, CONFIG]
  # Telegram forum-topic routing (config#1741 / T3 config#1749).
  - type: telegram
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    message_thread_id: ${FLOW_DOCTOR_TELEGRAM_THREAD_CRITICAL}
    parse_mode: Markdown
    disable_notification: false
    notify_on: [critical]
  - type: telegram
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    message_thread_id: ${FLOW_DOCTOR_TELEGRAM_THREAD_OPS_HEALTH}
    parse_mode: Markdown
    disable_notification: false
    notify_on: [error, warning]
    notify_on_category: [TRANSIENT, EXTERNAL, INFRA]
# DynamoDB-backed dedup store (alpha-engine-config#2418): the EC2 spot
# process and the three Lambdas here are separate invocations each time,
# so a /tmp SQLite store starts empty every run — dedup_cooldown_minutes
# below never actually suppresses a repeat alert, it just looks like it
# does. DynamoDB persists across those invocations so cooldowns hold.
store:
  type: dynamodb
  table_name: flow-doctor-store
  region: us-east-1
dedup_cooldown_minutes: 60
dependencies:
  - predictor-training
  - data-phase1
rate_limits:
  max_alerts_per_day: 10
  max_issues_per_day: 3
  max_diagnosed_per_day: 3
