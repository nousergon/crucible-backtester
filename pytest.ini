[pytest]
testpaths = tests
markers =
    live: opt-in live-resource test — requires real AWS/network/subprocess access. Excluded from default collection; run via `spot_backtest.sh` or `pytest -m live`.
    parity: opt-in replay parity test (Phase 1.1) — requires trades.db + ArcticDB access. Excluded from default collection; run via `pytest -m parity`.
addopts = -m "not parity and not live"
